<!DOCTYPE html>

<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body{
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    nav{
        background: #f4f4f4;
        padding: 15px;
        margin-bottom: 20px;
    }

    nav a{
        text-decoration: none;
        margin-right: 15px;
    }

    .container{
        max-width: 1200px;
        margin: 0 auto;
    }
</style>


</head>
<body>

<nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'profile' %}">Profile</a>

    {% if request.user.is_authenticated %}
        <span>Salom, {{ request.user.username }}</span>
        <a href="{% url 'logout' %}">Chiqish</a>
    {% else %}
        <a href="{% url 'login' %}">Kirish</a>
        <a href="{% url 'sign-up' %}">Ro'yxatdan o'tish</a>
    {% endif %}
</nav>

{% if messages %}
    <div class="messages-container">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}


<div class="container">
    {% block content %}
        
    {% endblock %}
</div>

</body>
</html>
